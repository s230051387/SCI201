<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=yes"
        />
        <title>Chapter 6: Temperature and Thermodynamics · SCI201</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <style>
            /* ================================================================
               GRUVBOX COLOR PALETTE
               ================================================================ */
            :root {
                --bg: #fbf1c7;
                --bg0_h: #f9f5d7;
                --bg0: #fbf1c7;
                --bg1: #ebdbb2;
                --bg2: #d5c4a1;
                --bg3: #bdae93;
                --bg4: #a89984;
                --fg: #3c3836;
                --fg0: #282828;
                --fg1: #3c3836;
                --fg2: #504945;
                --fg3: #665c54;
                --fg4: #7c6f64;
                --gray: #928374;
                --red: #9d0006;
                --green: #79740e;
                --yellow: #b57614;
                --blue: #076678;
                --purple: #8f3f71;
                --aqua: #427b58;
                --orange: #d65d0e;
                --surface: var(--bg0_h);
                --surface-alt: var(--bg1);
                --text: var(--fg1);
                --text-secondary: var(--fg3);
                --text-muted: var(--fg4);
                --border: var(--bg3);
                --border-light: var(--bg2);
                --primary: var(--blue);
                --primary-light: var(--bg2);
                --accent: var(--yellow);
                --success: var(--green);
                --danger: var(--red);
                --warning: var(--orange);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
                --shadow:
                    0 4px 6px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
                --radius: 12px;
                --radius-sm: 8px;
                --transition: 0.2s ease;
                --sidebar-width: 260px;
            }

            [data-theme="dark"] {
                --bg: #282828;
                --bg0_h: #1d2021;
                --bg0: #282828;
                --bg1: #3c3836;
                --bg2: #504945;
                --bg3: #665c54;
                --bg4: #7c6f64;
                --fg: #ebdbb2;
                --fg0: #fbf1c7;
                --fg1: #ebdbb2;
                --fg2: #d5c4a1;
                --fg3: #bdae93;
                --fg4: #a89984;
                --gray: #928374;
                --red: #cc241d;
                --green: #98971a;
                --yellow: #d79921;
                --blue: #458588;
                --purple: #b16286;
                --aqua: #689d6a;
                --orange: #d65d0e;
                --surface: var(--bg0_h);
                --surface-alt: var(--bg1);
                --text: var(--fg1);
                --text-secondary: var(--fg3);
                --text-muted: var(--fg4);
                --border: var(--bg3);
                --border-light: var(--bg2);
                --primary: var(--blue);
                --primary-light: var(--bg2);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                transition:
                    background var(--transition),
                    color var(--transition);
                min-height: 100vh;
                max-width: 1200px;
                margin: 0 auto;
                overflow-x: hidden;
            }

            .sidebar {
                width: var(--sidebar-width);
                flex-shrink: 0;
                position: sticky;
                top: 56px;
                height: calc(100vh - 56px);
                background: var(--surface);
                border-inline-end: 1px solid var(--border);
                padding: 1.5rem 1rem;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                overflow-x: hidden;
                z-index: 10;
                transition:
                    background var(--transition),
                    border-color var(--transition);
            }

            .sidebar-header {
                font-weight: 700;
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--text-muted);
                margin-bottom: 1rem;
                padding-bottom: 0.75rem;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-nav {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .sidebar-nav li a {
                display: block;
                padding: 0.5rem 0.75rem;
                border-radius: 6px;
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 500;
                transition: all 0.15s ease;
                border-left: 3px solid transparent;
            }

            .sidebar-nav li a:hover {
                background: var(--surface-alt);
                color: var(--text);
                border-left-color: var(--border);
            }

            .sidebar-nav li a.active {
                background: var(--primary-light);
                color: var(--primary);
                font-weight: 600;
                border-left-color: var(--primary);
            }

            .sidebar-nav li a .emoji {
                margin-right: 6px;
                font-size: 0.9rem;
            }
            .sidebar-divider {
                border: none;
                border-top: 1px solid var(--border);
                margin: 0.75rem 0;
            }

            .main-wrapper {
                flex: 1;
                min-width: 0;
                padding: 1.5rem 2rem;
            }

            header,
            section,
            footer,
            .concept-card,
            .professor-card,
            .ask-section,
            .vault-section,
            .quiz-section {
                background: var(--surface);
                border-radius: var(--radius);
                padding: 1.8rem;
                margin-bottom: 2rem;
                box-shadow: var(--shadow);
                border: 1px solid var(--border);
            }

            header {
                background: linear-gradient(135deg, var(--blue), var(--purple));
                color: var(--bg0_h);
            }

            h1,
            h2,
            h3 {
                font-weight: 600;
                letter-spacing: -0.02em;
                color: var(--fg0);
                scroll-margin-top: 1rem;
            }
            h1 {
                font-size: 2.2rem;
                margin: 0.5rem 0 0.3rem;
            }
            h2 {
                font-size: 1.5rem;
                margin: 1.2rem 0 1rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--primary);
            }

            .nav-btn {
                background: var(--primary);
                border: none;
                color: var(--bg0_h);
                padding: 0.5rem 1rem;
                border-radius: 2rem;
                font-weight: 500;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.9rem;
                cursor: pointer;
                transition: 0.2s;
                font-family: inherit;
            }
            .nav-btn:hover {
                filter: brightness(1.1);
                text-decoration: none;
                color: var(--bg0_h);
            }
            .nav-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .tag-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin-top: 1rem;
            }
            .tag {
                background: rgba(255, 255, 255, 0.15);
                color: var(--bg0_h);
                padding: 0.25rem 0.9rem;
                border-radius: 2rem;
                font-size: 0.8rem;
                font-weight: 500;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .tag--accent {
                background: rgba(255, 255, 255, 0.25);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .objectives-list {
                list-style: none;
                padding-left: 0;
            }
            .objectives-list li {
                padding: 0.4rem 0;
                display: flex;
                align-items: baseline;
                gap: 0.5rem;
                color: var(--text);
            }
            .objectives-list li::before {
                content: "●";
                color: var(--primary);
                font-weight: bold;
            }

            .concept-card {
                border-left: 4px solid var(--primary);
                padding: 1.5rem;
                scroll-margin-top: 1rem;
            }
            .concept-header {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-bottom: 1rem;
            }
            .concept-number {
                background: linear-gradient(135deg, var(--blue), var(--purple));
                color: var(--bg0_h);
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
            }

            .depth-tabs {
                display: inline-flex;
                gap: 4px;
                margin-bottom: 20px;
                background: var(--surface-alt);
                padding: 4px;
                border-radius: 10px;
                border: 1px solid var(--border);
            }
            .depth-tab {
                background: transparent;
                border: none;
                padding: 0.5rem 1.2rem;
                font-weight: 600;
                color: var(--text-secondary);
                cursor: pointer;
                border-radius: 2rem;
                transition: 0.2s;
                font-size: 0.9rem;
                font-family: inherit;
            }
            .depth-tab.active {
                background: var(--primary);
                color: var(--bg0_h);
            }

            .depth-content {
                display: none;
                animation: fade 0.2s ease;
                color: var(--text);
            }
            .depth-content.active {
                display: block;
            }
            @keyframes fade {
                from {
                    opacity: 0.3;
                }
                to {
                    opacity: 1;
                }
            }

            .formula {
                background: var(--surface-alt);
                padding: 0.8rem 1.2rem;
                border-radius: var(--radius-sm);
                margin: 1rem 0;
                font-family: "Courier New", monospace;
                font-weight: 500;
                border-left: 4px solid var(--primary);
                color: var(--fg0);
            }
            .label {
                display: block;
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--primary);
                margin-bottom: 0.2rem;
                font-weight: 600;
            }

            .note-box {
                background: var(--accent);
                border-left: 4px solid var(--orange);
                padding: 0.8rem 1rem;
                border-radius: 0.5rem;
                margin: 1.2rem 0;
                color: var(--bg0_h);
            }
            [data-theme="light"] .note-box {
                color: var(--fg0);
                background: var(--bg2);
            }

            .comparison-table-wrap {
                overflow-x: auto;
                margin: 1rem 0;
            }
            .comparison-table {
                width: 100%;
                border-collapse: collapse;
                background: var(--surface);
                border-radius: 0.5rem;
                overflow: hidden;
                border: 1px solid var(--border);
            }
            .comparison-table th {
                background: var(--surface-alt);
                padding: 0.7rem;
                text-align: left;
                color: var(--fg0);
                border-bottom: 2px solid var(--border);
            }
            .comparison-table td {
                padding: 0.6rem;
                border-bottom: 1px solid var(--border);
                color: var(--text);
            }

            .professor-card {
                border-left: 4px solid var(--purple);
            }
            .vault-entry {
                margin-bottom: 1rem;
                padding: 0.8rem;
                border-radius: 0.6rem;
                background: var(--surface-alt);
                border: 1px solid var(--border);
                color: var(--text);
            }
            .vault-type {
                font-weight: 700;
                margin-bottom: 0.3rem;
            }
            .vault-type--key {
                color: var(--accent);
            }
            .vault-type--trap {
                color: var(--red);
            }
            .vault-type--secret {
                color: var(--green);
            }

            .accordion-item {
                border-bottom: 1px solid var(--border);
            }
            .accordion-trigger {
                width: 100%;
                background: none;
                border: none;
                text-align: left;
                padding: 1rem 0;
                font-weight: 600;
                display: flex;
                justify-content: space-between;
                color: var(--text);
                cursor: pointer;
                font-family: inherit;
                font-size: 1rem;
            }
            .accordion-body {
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                padding: 0 0.5rem;
                color: var(--text-secondary);
            }
            .accordion-body.open {
                max-height: 300px;
                padding-bottom: 1rem;
            }

            .quiz-card {
                background: var(--surface-alt);
                border: 1px solid var(--border);
                padding: 1.5rem;
                border-radius: var(--radius);
            }
            .quiz-header {
                display: flex;
                justify-content: space-between;
                color: var(--text-secondary);
                margin-bottom: 0.5rem;
                font-weight: 600;
                font-size: 0.9rem;
            }
            .quiz-question {
                font-weight: 600;
                color: var(--fg0);
                margin: 1rem 0;
                font-size: 1.05rem;
                line-height: 1.6;
            }
            .quiz-options label {
                display: block;
                margin: 0.5rem 0;
                cursor: pointer;
                padding: 0.75rem 1rem;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border);
                transition: 0.2s;
                background: var(--surface);
                color: var(--text);
            }
            .quiz-options label:hover {
                border-color: var(--primary);
                background: var(--bg2);
            }
            .quiz-options input[type="radio"] {
                margin-right: 10px;
                accent-color: var(--primary);
                transform: scale(1.1);
            }
            .quiz-feedback {
                background: var(--surface);
                padding: 0.8rem 1rem;
                border-radius: var(--radius-sm);
                margin-top: 1rem;
                border-left: 4px solid var(--primary);
                color: var(--text);
                line-height: 1.6;
            }
            .hidden {
                display: none !important;
            }
            button {
                cursor: pointer;
            }
            footer {
                text-align: center;
                font-size: 0.85rem;
                color: var(--text-muted);
                border-top: 1px solid var(--border);
            }

            #quiz-hint-btn,
            #quiz-prev-btn {
                background: var(--surface);
                color: var(--text);
                border: 1px solid var(--border);
            }
            #quiz-hint-btn:hover,
            #quiz-prev-btn:hover {
                background: var(--primary);
                color: var(--bg0_h);
                border-color: var(--primary);
            }
            #quiz-next-btn,
            #retry-btn {
                background: var(--primary);
                color: var(--bg0_h);
                border: none;
            }
            .score-display {
                color: var(--primary);
                font-weight: 700;
                font-size: 2rem;
            }

            .sidebar-toggle {
                display: none;
                background: var(--primary);
                color: var(--bg0_h);
                border: none;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                font-size: 1.2rem;
                cursor: pointer;
                box-shadow: var(--shadow);
            }


            .toolbar {
                position: sticky;
                top: 0;
                z-index: 50;
                width: 100vw;
                left: 0;
                right: 0;
                background: rgba(251, 241, 199, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
                padding: 0.5rem calc((100vw - 1200px) / 2 + 1.5rem);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                margin-left: calc(-50vw + 600px);
                margin-right: calc(-50vw + 600px);
            }
            [data-theme="dark"] .toolbar {
                background: rgba(29, 32, 33, 0.9);
            }
            .toolbar-left,
            .toolbar-right {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .toolbar-center {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-weight: 700;
                font-size: 0.9rem;
                color: var(--text);
                background: var(--surface-alt);
                padding: 0.4rem 1rem;
                border-radius: 2rem;
                border: 1px solid var(--border);
            }
            .toolbar-btn {
                background: var(--surface-alt);
                border: 1px solid var(--border);
                color: var(--text);
                width: 36px;
                height: 36px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                text-decoration: none;
                font-size: 1rem;
                transition: all 0.2s ease;
            }
            .toolbar-btn:hover {
                background: var(--primary);
                color: var(--bg0_h);
                border-color: var(--aqua);
            }
            .toolbar-btn.disabled-btn {
                opacity: 0.3;
                cursor: not-allowed;
                pointer-events: none;
            }
            /* MOBILE */
            @media (max-width: 900px) {
                body {
                    flex-direction: column;
                }
                .sidebar {
                    display: none !important;
                }
                .sidebar-toggle {
                    display: flex !important;
                    position: static !important;
                    margin: 0;
                }
                .toolbar-hamburger {
                    display: none !important;
                }
                .toolbar {
                    width: 100%;
                    margin-left: 0;
                    margin-right: 0;
                    padding: 0.5rem 1rem;
                    left: 0;
                    right: 0;
                }
                .concept-number {
                    min-width: 32px;
                    min-height: 32px;
                    width: auto;
                    height: auto;
                    padding: 0.25rem 0.5rem;
                    flex-shrink: 0;
                }
                html,
                body {
                    overflow-x: hidden;
                    width: 100%;
                }
                .main-wrapper {
                    padding: 1rem;
                    width: 100%;
                }
            }
